# Lite, one-command run of the companion (chat + long-term memory), CPU-only.
#
#   docker compose up --build
#   → open http://localhost:8000
#
# First start downloads the models (~2 GB) into the `ollama-models` volume;
# later starts are fast. This is the LITE tier (text chat + memory). Voice,
# calls, and WhatsApp are a full local install, see the README.
services:
  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  companion:
    build: .
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      # Lite defaults; override to taste. A smaller model (e.g. llama3.2:1b)
      # responds faster on CPU.
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_EMBED_MODEL: nomic-embed-text
    ports:
      - "8000:8000"
    volumes:
      - companion-data:/data        # companion.db + chroma_db persist here
    restart: unless-stopped

volumes:
  ollama-models:
  companion-data:
